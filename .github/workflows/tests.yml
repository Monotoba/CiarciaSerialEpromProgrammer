name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libglx0 libxkbcommon-x11-0 libdbus-1-3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .

    - name: Run tests with coverage (Linux)
      if: runner.os == 'Linux'
      run: |
        pytest tests/ -v --cov=src/serial_eprom_programmer --cov-report=xml --cov-report=term -m "not gui" -p no:pytestqt
      env:
        QT_QPA_PLATFORM: offscreen

    - name: Run tests with coverage (non-Linux)
      if: runner.os != 'Linux'
      run: |
        pytest tests/ -v --cov=src/serial_eprom_programmer --cov-report=xml --cov-report=term
      env:
        QT_QPA_PLATFORM: offscreen

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
